<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Tree Canvas - Leadership</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- โหลด React และ Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- โหลด Firebase -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>

    <!-- Library สำหรับ PDF 1-Page -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * { font-family: 'Sarabun', sans-serif !important; }
        body { background-color: #fdf2f8; scroll-behavior: smooth; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tree-container { min-width: 1200px; padding: 40px; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input:focus, textarea:focus, select:focus { border-color: #db2777 !important; outline: none; box-shadow: 0 0 0 2px #fbcfe8; }
        @media print {
            .print-hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============ ICONS ============
        const Plus = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>;
        const Trash = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
        const Target = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const ArrowUp = ({ className }) => <svg className={className || "w-6 h-6 text-slate-400 my-2"} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="m5 12 7-7 7 7"/><path strokeLinecap="round" strokeLinejoin="round" d="M12 19V5"/></svg>;
        const TreeDeciduous = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22v-8"/><path d="M12 14a6 6 0 0 0-6-6c0-3 2-4 4-4 0-3 4-3 6 0 2 0 4 1 4 4a6 6 0 0 0-6 6z"/></svg>;
        const AlertCircle = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const CheckCircle2 = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const XIcon = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>;
        const FileText = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const UserIcon = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>;
        const ArrowRight = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 12h14m-7-7 7 7-7 7" /></svg>;
        const ArrowLeft = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 12H5m7-7-7 7 7 7" /></svg>;
        const Send = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="m22 2-7 20-4-9-9-4Z"/><path strokeLinecap="round" strokeLinejoin="round" d="M22 2 11 13"/></svg>;
        const Edit3 = ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;

        const genId = () => Math.random().toString(36).substr(2, 9);

        // ตัวช่วยคำนวณจำนวนบรรทัด (ให้กล่องขยายอัตโนมัติตามความยาว)
        const getRows = (txt) => {
            if (!txt) return 2;
            const lineBreaks = (txt.match(/\n/g) || []).length;
            const lengthRows = Math.ceil(txt.length / 22);
            return Math.max(2, lineBreaks + 1, lengthRows);
        };

        // --- Tree Logic Helpers ---
        const updateNodeItem = (nodes, nodeId, itemId, text) => nodes.map(n => {
            if (n.id === nodeId) return { ...n, items: n.items.map(i => i.id === itemId ? { ...i, text } : i) };
            if (n.children?.length) return { ...n, children: updateNodeItem(n.children, nodeId, itemId, text) };
            return n;
        });
        const addNodeItem = (nodes, nodeId) => nodes.map(n => {
            if (n.id === nodeId) return { ...n, items: [...n.items, { id: genId(), text: '' }] };
            if (n.children?.length) return { ...n, children: addNodeItem(n.children, nodeId) };
            return n;
        });
        const removeNodeItem = (nodes, nodeId, itemId) => nodes.filter(n => !(n.id === nodeId && n.items.length === 1 && n.items[0].id === itemId)).map(n => {
            if (n.id === nodeId) return { ...n, items: n.items.filter(i => i.id !== itemId) };
            if (n.children?.length) return { ...n, children: removeNodeItem(n.children, nodeId, itemId) };
            return n;
        });
        const addChildNode = (nodes, id) => nodes.map(n => {
            if (n.id === id) return { ...n, children: [...(n.children || []), { id: genId(), items: [{ id: genId(), text: '' }], children: [] }] };
            if (n.children?.length) return { ...n, children: addChildNode(n.children, id) };
            return n;
        });
        const itemExists = (nodes, itemId) => {
            for (let n of nodes) {
                if (n.items.some(i => i.id === itemId)) return true;
                if (n.children && itemExists(n.children, itemId)) return true;
            }
            return false;
        };

        // ================= COMPONENTS: Nodes =================
        const ImpactNodeUI = ({ node, onUpdateItem, onAddNodeItem, onAddChild, onRemoveItem, isReadOnly = false }) => (
            <div className="flex flex-col items-center">
                {node.children?.length > 0 && (
                    <div className="flex items-end justify-center gap-6 mb-4">
                        {node.children.map(child => (
                            <div key={child.id} className="flex flex-col items-center relative">
                                <ImpactNodeUI node={child} onUpdateItem={onUpdateItem} onAddNodeItem={onAddNodeItem} onAddChild={onAddChild} onRemoveItem={onRemoveItem} isReadOnly={isReadOnly} />
                                <ArrowUp className="text-green-400 my-2 h-6 w-6 opacity-60" />
                            </div>
                        ))}
                    </div>
                )}
                <div className={`flex items-center justify-center gap-3 relative group/node p-3 rounded-2xl transition-all border-2 border-dashed ${isReadOnly ? 'p-0 border-transparent' : 'border-transparent hover:border-green-200 bg-white/40'}`}>
                    {node.items.map((item, idx) => (
                        <div key={item.id} className={`relative group/item flex items-center border-2 rounded-xl shadow-sm w-[200px] z-10 transition-all min-h-[50px] ${isReadOnly ? 'bg-green-50/90 border-green-300 shadow-md' : 'bg-green-50 border-green-400/40 focus-within:ring-2 focus-within:ring-green-500'}`}>
                            {isReadOnly ? (
                                <div className="w-full text-center p-3 text-sm font-bold text-slate-800 break-words whitespace-pre-wrap leading-snug">{item.text || "-"}</div>
                            ) : (
                                <textarea placeholder="ส่งผลอะไรต่อ?" className="w-full text-center p-2.5 bg-transparent text-sm font-bold text-slate-800 outline-none resize-none overflow-hidden leading-snug" value={item.text} onChange={e => onUpdateItem(node.id, item.id, e.target.value)} rows={getRows(item.text)} />
                            )}
                            {!isReadOnly && (
                                <>
                                    <button onClick={() => onRemoveItem(node.id, item.id)} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1 opacity-0 group-hover/item:opacity-100 transition-opacity"><XIcon className="h-3 w-3" /></button>
                                    {idx === node.items.length - 1 && <button onClick={() => onAddNodeItem(node.id)} className="absolute -right-4 top-1/2 -translate-y-1/2 translate-x-full bg-green-500 text-white rounded-full p-1.5 opacity-0 group-hover/node:opacity-100 z-30 transition-opacity"><Plus className="h-4 w-4" /></button>}
                                </>
                            )}
                        </div>
                    ))}
                    {!isReadOnly && <button onClick={() => onAddChild(node.id)} className="absolute -top-5 left-1/2 -translate-x-1/2 -translate-y-full opacity-0 group-hover/node:opacity-100 bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg whitespace-nowrap transition-opacity flex items-center gap-1 shadow-md"><ArrowUp className="h-3 w-3" /> เพิ่มยอดผลกระทบ</button>}
                </div>
            </div>
        );

        const RootNodeUI = ({ node, onUpdateItem, onAddNodeItem, onAddChild, onRemoveItem, onSelect, selectedId, isReadOnly = false }) => (
            <div className="flex flex-col items-center">
                <div className={`flex items-center justify-center gap-3 relative group/node p-3 rounded-2xl transition-all border-2 border-dashed ${isReadOnly ? 'p-0 border-transparent' : 'border-transparent hover:border-rose-200 bg-white/40'}`}>
                    {node.items.map((item, idx) => {
                        const isSelected = selectedId === item.id;
                        return (
                            <div key={item.id} className={`relative group/item flex items-center rounded-xl p-1.5 transition-all w-[220px] z-10 min-h-[50px] ${isSelected ? 'ring-4 ring-pink-500 scale-105 bg-white shadow-xl' : isReadOnly ? 'bg-white/90 ring-1 ring-slate-300' : 'bg-white ring-1 ring-slate-200 hover:ring-pink-400'}`}>
                                {isReadOnly ? (
                                    <div className="w-full p-3 text-sm font-medium text-slate-800 break-words whitespace-pre-wrap text-center leading-snug">{item.text || "-"}</div>
                                ) : (
                                    <textarea placeholder="ทำไมถึงเป็นเช่นนั้น?" className="w-full p-2 bg-transparent text-sm font-medium text-slate-800 outline-none resize-none overflow-hidden text-center leading-snug" value={item.text} onChange={e => onUpdateItem(node.id, item.id, e.target.value)} rows={getRows(item.text)} />
                                )}
                                {isReadOnly ? (isSelected && <div className="p-2 text-pink-600 bg-pink-100 rounded-md ml-1"><Target className="h-5 w-5" /></div>) : (
                                    <button onClick={() => onSelect(item)} className={`p-2 rounded-md transition-colors flex-shrink-0 ml-1 z-10 ${isSelected ? 'bg-pink-100 text-pink-600' : 'text-slate-200 hover:text-pink-500 hover:bg-pink-50'}`} title="ล็อกเป้าหมายรากแก้ว"><Target className="h-5 w-5" /></button>
                                )}
                                {!isReadOnly && (
                                    <>
                                        <button onClick={() => onRemoveItem(node.id, item.id)} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1 opacity-0 group-hover/item:opacity-100 transition-opacity shadow-sm"><XIcon className="h-3 w-3" /></button>
                                        {idx === node.items.length - 1 && <button onClick={() => onAddNodeItem(node.id)} className="absolute -right-4 top-1/2 -translate-y-1/2 translate-x-full bg-slate-700 text-white rounded-full p-1.5 opacity-0 group-hover/node:opacity-100 z-30 transition-opacity"><Plus className="h-4 w-4" /></button>}
                                    </>
                                )}
                            </div>
                        )
                    })}
                    {!isReadOnly && <button onClick={() => onAddChild(node.id)} className="absolute -bottom-5 left-1/2 -translate-x-1/2 translate-y-full opacity-0 group-hover/node:opacity-100 bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg whitespace-nowrap transition-opacity flex items-center gap-1 shadow-md"><ArrowUp className="h-3 w-3 rotate-180" /> เพิ่มสาเหตุย่อย</button>}
                </div>
                {node.children?.length > 0 && (
                    <div className="flex items-start justify-center gap-6 mt-4">
                        {node.children.map(child => (
                            <div key={child.id} className="flex flex-col items-center">
                                <ArrowUp className="text-rose-400 my-2 h-6 w-6 opacity-60" />
                                <RootNodeUI node={child} onUpdateItem={onUpdateItem} onAddNodeItem={onAddNodeItem} onAddChild={onAddChild} onRemoveItem={onRemoveItem} onSelect={onSelect} selectedId={selectedId} isReadOnly={isReadOnly} />
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );

        // ================= MAIN APP =================
        function App() {
            const [draftLoaded, setDraftLoaded] = useState(false);
            const [step, setStep] = useState(1);
            const problemPreviewRef = useRef(null);
            const [isExporting, setIsExporting] = useState(false);

            // ข้อมูลพนักงาน
            const [empId, setEmpId] = useState('');
            const [name, setName] = useState('');
            const [nickname, setNickname] = useState('');
            const [role, setRole] = useState('AM');
            const [area, setArea] = useState('กรุงเทพฯ-ปริมณฑลตะวันตก');
            const [batch, setBatch] = useState('1');
            const [customBatch, setCustomBatch] = useState('');

            // ข้อมูลปัญหา
            const [problemDef, setProblemDef] = useState({ what: '', howMuch: '', whereWhen: '' });
            const [impacts, setImpacts] = useState([{ id: genId(), items: [{ id: genId(), text: '' }], children: [] }]);
            const [roots, setRoots] = useState([{ id: genId(), items: [{ id: genId(), text: '' }], children: [] }]);
            
            const [selectedRoot, setSelectedRoot] = useState({ id: null, text: '', category: '' }); 
            const [actionPlans, setActionPlans] = useState([{ action: '', who: '', when: '', measure: '' }]);
            
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                const draft = localStorage.getItem('problemTreeDraft');
                if (draft) {
                    try {
                        const d = JSON.parse(draft);
                        if (d.step) setStep(d.step);
                        if (d.empId) setEmpId(d.empId);
                        if (d.name) setName(d.name);
                        if (d.nickname) setNickname(d.nickname);
                        if (d.role) setRole(d.role);
                        if (d.area) setArea(d.area);
                        if (d.batch) setBatch(d.batch);
                        if (d.customBatch) setCustomBatch(d.customBatch);
                        if (d.problemDef) setProblemDef(d.problemDef);
                        if (d.impacts && d.impacts.length) setImpacts(d.impacts);
                        if (d.roots && d.roots.length) setRoots(d.roots);
                        if (d.selectedRoot) setSelectedRoot(d.selectedRoot);
                        if (d.actionPlans && d.actionPlans.length) setActionPlans(d.actionPlans);
                    } catch(e) { console.error("Draft error", e); }
                }
                setDraftLoaded(true);
            }, []);

            useEffect(() => {
                if (draftLoaded && !isSubmitted) {
                    const draftData = { step, empId, name, nickname, role, area, batch, customBatch, problemDef, impacts, roots, selectedRoot, actionPlans };
                    localStorage.setItem('problemTreeDraft', JSON.stringify(draftData));
                }
            }, [step, empId, name, nickname, role, area, batch, customBatch, problemDef, impacts, roots, selectedRoot, actionPlans, isSubmitted, draftLoaded]);

            useEffect(() => {
                if (draftLoaded && empId.length >= 5) {
                    const profiles = JSON.parse(localStorage.getItem('employeeProfiles') || '{}');
                    if (profiles[empId]) {
                        if (!name) setName(profiles[empId].name);
                        if (!nickname) setNickname(profiles[empId].nickname);
                        if (profiles[empId].role) setRole(profiles[empId].role);
                        if (profiles[empId].area) setArea(profiles[empId].area);
                        if (profiles[empId].batch) setBatch(profiles[empId].batch);
                        if (profiles[empId].customBatch) setCustomBatch(profiles[empId].customBatch || '');
                    }
                }
            }, [empId, draftLoaded]);

            const combinedProblem = `${problemDef.what} ${problemDef.howMuch} ${problemDef.whereWhen}`.trim();
            const finalBatch = batch === 'อื่นๆ' ? customBatch : batch;

            // --- Handlers ---
            const handleUpdateImpact = (nId, iId, text) => setImpacts(prev => updateNodeItem(prev, nId, iId, text));
            const handleAddImpactItem = (nId) => setImpacts(prev => addNodeItem(prev, nId));
            const handleRemoveImpactItem = (nId, iId) => setImpacts(prev => removeNodeItem(prev, nId, iId));
            const handleAddImpactChild = (nId) => setImpacts(prev => addChildNode(prev, nId));
            const handleAddTopImpact = () => setImpacts(prev => [...prev, { id: genId(), items: [{ id: genId(), text: '' }], children: [] }]);

            const handleUpdateRoot = (nId, iId, text) => {
                setRoots(prev => updateNodeItem(prev, nId, iId, text));
                if (selectedRoot.id === iId) setSelectedRoot(prev => ({ ...prev, text }));
            };
            const handleAddRootItem = (nId) => setRoots(prev => addNodeItem(prev, nId));
            const handleRemoveRootItem = (nId, iId) => {
                setRoots(prev => {
                    const nextRoots = removeNodeItem(prev, nId, iId);
                    if (selectedRoot.id === iId || !itemExists(nextRoots, selectedRoot.id)) {
                        setSelectedRoot({ id: null, text: '', category: '' });
                    }
                    return nextRoots;
                });
            };
            const handleAddRootChild = (nId) => setRoots(prev => addChildNode(prev, nId));
            const handleAddTopRoot = () => setRoots(prev => [...prev, { id: genId(), items: [{ id: genId(), text: '' }], children: [] }]);
            
            const handleSelectRoot = (item) => {
                const newCategory = selectedRoot.id === item.id ? selectedRoot.category : '';
                setSelectedRoot({ id: item.id, text: item.text, category: newCategory });
            };

            const handleActionPlanChange = (index, field, value) => {
                const newPlans = [...actionPlans];
                newPlans[index][field] = value;
                setActionPlans(newPlans);
            };
            const addActionPlan = () => setActionPlans([...actionPlans, { action: '', who: '', when: '', measure: '' }]);
            const removeActionPlan = (index) => {
                if (actionPlans.length > 1) setActionPlans(actionPlans.filter((_, i) => i !== index));
            };

            const handleNext = () => {
                if (step === 1) {
                    if (!empId || empId.length < 8) return alert("กรุณากรอกรหัสพนักงาน 8 หลัก ให้ถูกต้องครับ");
                    if (!name.trim() || !nickname.trim()) return alert("กรุณากรอกชื่อ และ ชื่อเล่นให้ครบถ้วนครับ");
                    if (!problemDef.what.trim()) return alert("กรุณาระบุ 'ปัญหาหลัก (What)' ก่อนไปต่อนะครับ");
                    if (batch === 'อื่นๆ' && !customBatch.trim()) return alert("กรุณาระบุชื่อรุ่นที่อบรมด้วยครับ");
                    setStep(2); window.scrollTo(0, 0);
                } else if (step === 2) {
                    if (!selectedRoot.id || !selectedRoot.text.trim()) return alert("กรุณาคลิกเลือก 'รากแก้ว' ที่จะนำไปแก้ปัญหาต่อ (คลิกไอคอนเป้าหมาย 🎯)");
                    if (!selectedRoot.category) return alert("กรุณาเลือก 'หมวดหมู่ 4M1E' ให้กับรากแก้วเป้าหมายของคุณด้วยครับ");
                    setStep(3); window.scrollTo(0, 0);
                }
            };

            const handlePrev = () => {
                if (isSubmitted) { setIsSubmitted(false); window.scrollTo(0, 0); }
                else if (step > 1) { setStep(step - 1); window.scrollTo(0, 0); }
            };

            const handleSubmit = async () => {
                if (!selectedRoot.category) {
                    alert("กรุณาเลือก 'หมวดหมู่ 4M1E' ให้กับรากแก้วเป้าหมายของคุณด้วยครับ");
                    return;
                }
                
                setIsSubmitting(true);
                try {
                    const firebaseConfig = { apiKey: "AIzaSyBLsXSyzZz1MxPHOqp1c3SQLXZOYGu3vqE", authDomain: "leadership-problem-tree.firebaseapp.com", projectId: "leadership-problem-tree", storageBucket: "leadership-problem-tree.firebasestorage.app", messagingSenderId: "235048343097", appId: "1:235048343097:web:6c628b6ff5e4b6fd63dfe8", measurementId: "G-CVXWV2HLKP" };
                    if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                    const auth = window.firebase.auth(); await auth.signInAnonymously();
                    const db = window.firebase.firestore();
                    
                    const payload = {
                        empId, name, nickname, role, area, batch: finalBatch,
                        problemWhat: problemDef.what, problemHowMuch: problemDef.howMuch, problemWhereWhen: problemDef.whereWhen,
                        impacts, roots, 
                        selectedRootId: selectedRoot.id, 
                        selectedRoot: selectedRoot.text, 
                        selectedRootCategory: selectedRoot.category, 
                        actionPlans,
                        timestamp: window.firebase.firestore.FieldValue.serverTimestamp(),
                        date: new Date().toLocaleDateString('th-TH')
                    };
                    
                    await db.collection('artifacts').doc('leadership-app').collection('public').doc('data').collection('problems').add(payload);
                    
                    const profiles = JSON.parse(localStorage.getItem('employeeProfiles') || '{}');
                    profiles[empId] = { name, nickname, role, area, batch, customBatch };
                    localStorage.setItem('employeeProfiles', JSON.stringify(profiles));
                    
                    localStorage.removeItem('problemTreeDraft');
                    setIsSubmitted(true); window.scrollTo(0, 0);
                } catch (e) {
                    console.error(e);
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้งครับ");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const exportPDF = async () => {
                setIsExporting(true);
                const element = document.getElementById('pdf-summary-content');
                if (!element) return;
                
                const origBg = element.style.backgroundColor;
                element.style.backgroundColor = '#ffffff';
                
                try {
                    const canvas = await html2canvas(element, { scale: 1.5, useCORS: true, logging: false });
                    element.style.backgroundColor = origBg; 
                    
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jspdf.jsPDF('l', 'mm', 'a4'); 
                    const pdfWidth = pdf.internal.pageSize.getWidth(); 
                    const pdfHeight = pdf.internal.pageSize.getHeight(); 
                    
                    const imgProps = pdf.getImageProperties(imgData);
                    const ratio = Math.min(pdfWidth / imgProps.width, pdfHeight / imgProps.height);
                    
                    const imgWidth = imgProps.width * ratio;
                    const imgHeight = imgProps.height * ratio;
                    const x = (pdfWidth - imgWidth) / 2; 
                    const y = (pdfHeight - imgHeight) / 2; 
                    
                    pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
                    pdf.save(`ProblemTree_HQ_${empId}.pdf`);
                } catch (err) {
                    console.error(err);
                    alert("เกิดข้อผิดพลาดในการสร้าง PDF");
                    element.style.backgroundColor = origBg;
                } finally {
                    setIsExporting(false);
                }
            };

            if (!draftLoaded) return <div className="min-h-screen flex items-center justify-center font-bold text-slate-500 animate-pulse">กำลังโหลดข้อมูล...</div>;

            // ================= VIEW: SUMMARY (isSubmitted) =================
            if (isSubmitted) {
                return (
                    <div className="min-h-screen bg-slate-50 text-slate-800 pb-24">
                        <div className="max-w-7xl mx-auto p-4 md:p-6 space-y-6 mt-4 print-hidden">
                            <div className="bg-emerald-50 border-2 border-emerald-500 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-6 shadow-lg">
                                <div className="flex items-center gap-5">
                                    <div className="bg-emerald-500 text-white rounded-full p-3 shadow-md flex-shrink-0"><CheckCircle2 className="h-10 w-10" /></div>
                                    <div>
                                        <h2 className="text-2xl font-bold text-emerald-800 mb-1">✅ ส่งข้อมูลเข้าสู่ระบบเรียบร้อยแล้ว!</h2>
                                        <p className="text-emerald-600 font-medium text-lg">ข้อมูลต้นไม้ปัญหาของคุณถูกบันทึกและส่งให้ส่วนกลาง (HQ) รับทราบเรียบร้อยแล้วครับ</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* --- CONTENT FOR PDF EXPORT --- */}
                        <div id="pdf-summary-content" className="max-w-[1400px] mx-auto p-4 md:p-8 space-y-6">
                            
                            <div className="bg-slate-900 text-white py-8 px-10 rounded-2xl shadow-md border-b-4 border-pink-500 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div>
                                    <span className="text-pink-400 font-bold tracking-wider text-sm uppercase">Presentation Summary</span>
                                    <h1 className="text-4xl font-bold mt-2 mb-4">สรุปการวิเคราะห์ต้นไม้ปัญหา</h1>
                                    <div className="flex flex-wrap items-center gap-x-6 gap-y-2 text-slate-300 text-lg">
                                        <div className="flex items-center gap-2"><UserIcon className="h-5 w-5 text-pink-400" /><span><b>{name} ({nickname})</b></span></div>
                                        <span>รหัส: <b>{empId}</b></span>
                                        <span>ตำแหน่ง: <b>{role}</b></span>
                                        <span>เขต: <b>{area}</b></span>
                                        <span className="bg-pink-600 text-white text-sm font-bold px-3 py-1 rounded-full">รุ่นอบรม: {finalBatch}</span>
                                    </div>
                                </div>
                                <TreeDeciduous className="text-pink-500 h-20 w-20 opacity-80 flex-shrink-0" />
                            </div>

                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-2 h-full bg-amber-500"></div>
                                <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-3"><span className="bg-amber-100 text-amber-600 h-8 w-8 rounded-full flex items-center justify-center font-bold text-lg">1</span>ปัญหาที่นำมาวิเคราะห์ (Problem Statement)</h2>
                                <div className="text-2xl font-bold text-slate-800 text-center bg-amber-50 py-6 px-6 rounded-xl border border-amber-200 shadow-inner">"{combinedProblem}"</div>
                            </section>

                            <section className="bg-slate-900 p-8 rounded-2xl shadow-xl border border-slate-700 overflow-x-auto">
                                <h2 className="text-xl font-bold text-white mb-8 flex items-center gap-3 min-w-[800px]"><span className="bg-pink-500 text-white h-8 w-8 rounded-full flex items-center justify-center font-bold text-lg">2</span>โครงสร้างต้นไม้ปัญหา (Problem Tree)</h2>
                                <div className="relative min-w-[1000px] flex flex-col items-center pb-6">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-80 h-full bg-amber-700/20 blur-3xl rounded-full pointer-events-none"></div>
                                    <div className="relative z-10 mb-6 flex items-end justify-center gap-10 w-full">{impacts.map(topNode => (<div key={topNode.id} className="flex flex-col items-center"><ImpactNodeUI node={topNode} isReadOnly={true} /><ArrowUp className="text-green-400 my-2 h-6 w-6 opacity-60" /></div>))}</div>
                                    <div className="relative z-10 mb-6 w-full max-w-3xl bg-white/95 p-5 rounded-xl shadow-2xl border-l-8 border-amber-500 text-center"><span className="text-amber-800 text-xs font-bold px-3 py-1 rounded-full border border-amber-200 uppercase bg-amber-100 mb-2 inline-block">ปัญหาหลัก</span><p className="text-xl font-bold text-slate-900">{combinedProblem}</p></div>
                                    <div className="relative z-10 flex items-start justify-center gap-10 w-full">{roots.map(topNode => (<div key={topNode.id} className="flex flex-col items-center"><ArrowUp className="text-rose-400 my-2 h-6 w-6 opacity-60" /><RootNodeUI node={topNode} selectedId={selectedRoot.id} isReadOnly={true} /></div>))}</div>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                                <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3"><span className="bg-blue-100 text-blue-600 h-8 w-8 rounded-full flex items-center justify-center font-bold text-lg">3</span>แผนแก้ปัญหาแบบขุดราก (Action Plan)</h2>
                                <div className="mb-6 bg-pink-50 p-4 rounded-xl border border-pink-200 flex flex-col md:flex-row md:items-center gap-4 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <Target className="text-pink-600 h-8 w-8 flex-shrink-0" />
                                        <div>
                                            <h3 className="text-xs font-bold text-pink-800 uppercase tracking-wider mb-1">เป้าหมายรากแก้วที่จะถูกแก้ไข:</h3>
                                            <p className="text-lg font-bold text-slate-900">{selectedRoot.text}</p>
                                        </div>
                                    </div>
                                    <div className="md:ml-auto bg-white px-4 py-2 rounded-lg border border-pink-200 shadow-sm flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-500 uppercase">หมวดหมู่ 4M1E:</span>
                                        <span className="text-sm font-bold text-pink-700">{selectedRoot.category || "-"}</span>
                                    </div>
                                </div>
                                <div className="overflow-hidden rounded-xl border border-slate-200">
                                    <table className="w-full text-left border-collapse text-sm">
                                        <thead className="bg-slate-800 text-white"><tr><th className="p-3 font-semibold w-[40%] border-r border-slate-700">ลงมือทำอะไร? (Action)</th><th className="p-3 font-semibold w-[15%] border-r border-slate-700">ผู้เกี่ยวข้อง (Who)</th><th className="p-3 font-semibold w-[15%] border-r border-slate-700">กำหนดเสร็จ (When)</th><th className="p-3 font-semibold w-[30%]">วิธีวัดผล (Measurement)</th></tr></thead>
                                        <tbody>
                                            {actionPlans.map((plan, i) => (
                                                <tr key={i} className="border-b border-slate-200 last:border-0 hover:bg-slate-50">
                                                    <td className="p-3 border-r border-slate-200 text-slate-800">{plan.action || "-"}</td><td className="p-3 border-r border-slate-200 text-slate-800 font-medium">{plan.who || "-"}</td><td className="p-3 border-r border-slate-200 text-rose-600 font-semibold">{plan.when || "-"}</td><td className="p-3 text-slate-800">{plan.measure || "-"}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                        {/* --- END CONTENT FOR PDF --- */}

                        <div className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] print-hidden z-50">
                            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                                <button onClick={handlePrev} className="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 transition-all hover:-translate-y-0.5"><Edit3 className="h-5 w-5" /> ย้อนกลับไปแก้ไขข้อมูล</button>
                                <button onClick={exportPDF} disabled={isExporting} className={`w-full md:w-auto flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-bold text-white shadow-lg transition-all hover:-translate-y-0.5 ${isExporting ? 'bg-slate-500 cursor-not-allowed' : 'bg-pink-600 hover:bg-pink-700'}`}>
                                    <FileText className="h-5 w-5" /> {isExporting ? 'กำลังสร้างไฟล์ PDF...' : 'ดาวน์โหลด PDF (1 หน้า)'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ================= VIEW: WIZARD =================
            return (
                <div className="min-h-screen bg-slate-50 pb-24 text-slate-800 px-4 md:px-8">
                    <div className={`mx-auto pt-6 space-y-6 ${step === 2 ? 'w-full' : 'max-w-5xl'}`}>
                        
                        <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 max-w-5xl mx-auto">
                            <h1 className="text-2xl font-bold flex items-center gap-3"><TreeDeciduous className="text-pink-600 h-8 w-8" /> Problem Tree Canvas</h1>
                            <div className="flex gap-2">
                                {[1, 2, 3].map(n => (
                                    <div key={n} className={`w-10 h-10 rounded-full flex items-center justify-center font-bold border-2 transition-all ${step >= n ? 'bg-pink-600 border-pink-100 text-white shadow-md' : 'bg-white border-slate-200 text-slate-400'}`}>
                                        {step > n ? <CheckCircle2 className="h-5 w-5" /> : n}
                                    </div>
                                ))}
                            </div>
                        </header>

                        {/* ================= STEP 1: ข้อมูลและปัญหา ================= */}
                        {step === 1 && (
                            <section className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-100 space-y-10 animate-in fade-in slide-in-from-bottom-4 max-w-5xl mx-auto">
                                
                                <div className="bg-indigo-50/50 p-6 md:p-8 rounded-2xl border border-indigo-100 shadow-inner">
                                    <h3 className="text-sm font-bold text-indigo-800 flex items-center gap-2 mb-6"><UserIcon className="h-5 w-5" /> ข้อมูลผู้วิเคราะห์ (พิมพ์รหัส 8 หลักเพื่อดึงข้อมูลอัตโนมัติ)</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-6 gap-5">
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">รหัสพนักงาน (8 หลัก) <span className="text-rose-500">*</span></label>
                                            <input maxLength="8" placeholder="เช่น 00123456" className="w-full p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-bold tracking-widest text-indigo-700 outline-none" value={empId} onChange={e => setEmpId(e.target.value.replace(/\D/g,''))} />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">ชื่อ-นามสกุล <span className="text-rose-500">*</span></label>
                                            <input className="w-full p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" value={name} onChange={e => setName(e.target.value)} />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">ชื่อเล่น <span className="text-rose-500">*</span></label>
                                            <input className="w-full p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" value={nickname} onChange={e => setNickname(e.target.value)} />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">ตำแหน่ง</label>
                                            <select className="w-full p-3 bg-white border border-slate-300 rounded-xl font-bold text-slate-700 outline-none" value={role} onChange={e => setRole(e.target.value)}><option>AM</option><option>DAM</option><option>SAM</option></select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">เขต/ภูมิภาค</label>
                                            <select className="w-full p-3 bg-white border border-slate-300 rounded-xl font-bold text-slate-700 outline-none" value={area} onChange={e => setArea(e.target.value)}>
                                                <option value="กรุงเทพฯ-ปริมณฑลตะวันตก">กรุงเทพฯ-ปริมณฑลตะวันตก</option><option value="ภาคใต้">ภาคใต้</option><option value="ภาคตะวันออก">ภาคตะวันออก</option><option value="ภาคกลาง">ภาคกลาง</option>
                                                <option value="กรุงเทพฯ-ปริมณฑลตะวันออก">กรุงเทพฯ-ปริมณฑลตะวันออก</option><option value="ภาคตะวันออกเฉียงเหนือตอนล่าง">ภาคตะวันออกเฉียงเหนือตอนล่าง</option><option value="ภาคตะวันออกเฉียงเหนือตอนบน">ภาคตะวันออกเฉียงเหนือตอนบน</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">รุ่นที่อบรม <span className="text-rose-500">*</span></label>
                                            <div className="flex gap-2">
                                                <select className={`p-3 bg-white border border-slate-300 rounded-xl font-bold text-slate-700 outline-none ${batch==='อื่นๆ' ? 'w-1/3' : 'w-full'}`} value={batch} onChange={e => setBatch(e.target.value)}>
                                                    <option value="1">รุ่น 1</option><option value="2">รุ่น 2</option><option value="3">รุ่น 3</option><option value="อื่นๆ">อื่นๆ</option>
                                                </select>
                                                {batch === 'อื่นๆ' && <input placeholder="ระบุชื่อรุ่น..." className="w-2/3 p-3 bg-white border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-bold outline-none" value={customBatch} onChange={e => setCustomBatch(e.target.value)} />}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <div className="flex items-center gap-3 mb-6"><div className="bg-pink-100 text-pink-700 h-10 w-10 rounded-full flex items-center justify-center font-bold text-xl">1</div><h2 className="text-2xl font-bold text-slate-800">ตั้งลำต้น (Define the Problem)</h2></div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-2">1. ปัญหาที่พบคืออะไร? (What) <span className="text-rose-500">*</span></label><input type="text" placeholder="เช่น ลูกค้ารถยนต์ผิดนัดชำระงวดแรก" className="w-full p-4 border border-slate-200 rounded-xl outline-none bg-slate-50 focus:bg-white focus:border-pink-500 text-sm" value={problemDef.what} onChange={(e) => setProblemDef({...problemDef, what: e.target.value})} /></div>
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-2">2. ตัวเลข/สถานการณ์ (How much)</label><input type="text" placeholder="เช่น สูงเกินมาตรฐาน 5%" className="w-full p-4 border border-slate-200 rounded-xl outline-none bg-slate-50 focus:bg-white focus:border-pink-500 text-sm" value={problemDef.howMuch} onChange={(e) => setProblemDef({...problemDef, howMuch: e.target.value})} /></div>
                                        <div><label className="block text-sm font-semibold text-slate-700 mb-2">3. ที่ไหน/เมื่อไหร่? (Where/When)</label><input type="text" placeholder="เช่น ในหนึ่งเดือนที่ผ่านมา ที่สาขา A" className="w-full p-4 border border-slate-200 rounded-xl outline-none bg-slate-50 focus:bg-white focus:border-pink-500 text-sm" value={problemDef.whereWhen} onChange={(e) => setProblemDef({...problemDef, whereWhen: e.target.value})} /></div>
                                    </div>
                                    <div ref={problemPreviewRef} className="mt-8 p-8 bg-amber-50 rounded-2xl border-2 border-dashed border-amber-300 text-center shadow-inner">
                                        <h4 className="text-amber-800 font-bold mb-3 uppercase text-xs tracking-widest">ประโยคปัญหาหลักของคุณคือ</h4>
                                        <p className="text-3xl font-black text-slate-800">"{combinedProblem || "..."}"</p>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* ================= STEP 2: ต้นไม้ปัญหา ================= */}
                        {step === 2 && (
                            <section className="bg-white p-4 md:p-8 rounded-3xl shadow-sm border border-slate-100 overflow-x-auto w-full animate-in fade-in">
                                
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4 sticky left-0 min-w-[800px]">
                                    <div className="bg-slate-50 border border-slate-200 p-3 rounded-lg flex-1 w-full flex justify-between items-center">
                                        <div>
                                            <span className="text-slate-500 text-[10px] font-bold uppercase tracking-wider block mb-0.5">ประโยคปัญหาหลักของคุณคือ</span>
                                            <span className="text-slate-800 font-bold text-sm">{combinedProblem || "-"}</span>
                                        </div>
                                        <button onClick={() => setStep(1)} className="text-[10px] text-pink-600 hover:underline px-2 py-1 bg-white border border-slate-200 rounded">แก้ไขปัญหา</button>
                                    </div>

                                    {!selectedRoot.id && (
                                        <div className="bg-red-50 border border-red-300 text-red-700 px-3 py-2 rounded-lg flex items-center gap-1.5 shadow-sm text-xs flex-shrink-0 animate-pulse">
                                            <Target className="h-3.5 w-3.5" /> <span className="font-bold">อย่าลืมเลือกล็อกเป้ารากแก้วที่ต้องการ!</span>
                                        </div>
                                    )}
                                </div>

                                <div className="flex items-center gap-3 mb-6 min-w-[800px] sticky left-0">
                                    <div className="bg-pink-100 text-pink-700 h-10 w-10 rounded-full flex items-center justify-center font-bold text-xl">2</div>
                                    <div>
                                        <h2 className="text-2xl font-bold text-slate-800">วิเคราะห์รากและผลกระทบ (Problem Tree)</h2>
                                        <p className="text-sm text-slate-500">ใช้ปุ่ม <Plus className="inline h-4 w-4 bg-slate-700 text-white rounded-full p-0.5"/> เพื่อแตกความลึก และปุ่มกล่องคู่ขนานเพื่อแชร์เส้นทางร่วมกัน</p>
                                    </div>
                                </div>
                                
                                <div className="bg-slate-900 rounded-3xl p-8 md:p-14 relative min-w-[1200px] pb-16 shadow-xl">
                                    <div className="relative z-10 mb-10">
                                        <div className="text-center mb-8"><span className="bg-green-100 text-green-800 text-sm font-bold px-5 py-2 rounded-full border border-green-200 uppercase tracking-widest shadow-sm">กิ่งก้านใบ (ผลกระทบ)</span></div>
                                        <div className="flex items-end justify-center gap-16">
                                            {impacts.map(topNode => (
                                                <div key={topNode.id} className="flex flex-col items-center">
                                                    <ImpactNodeUI node={topNode} onUpdateItem={handleUpdateImpact} onAddNodeItem={handleAddImpactItem} onAddChild={handleAddImpactChild} onRemoveItem={handleRemoveImpactItem} />
                                                    <ArrowUp className="text-green-400 my-2 h-8 w-8 opacity-60" />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex justify-center mt-8 relative z-20">
                                            <button onClick={handleAddTopImpact} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl border border-slate-600 font-bold transition-colors shadow-md"><Plus className="h-5 w-5" /> เพิ่มกิ่งผลกระทบหลัก</button>
                                        </div>
                                    </div>
                                    
                                    <div className="relative z-10 mb-10 flex justify-center">
                                        <div className="w-full max-w-4xl bg-white p-8 rounded-2xl shadow-2xl border-l-8 border-amber-500 text-center relative">
                                            <span className="absolute -top-4 left-1/2 -translate-x-1/2 bg-amber-100 text-amber-800 text-xs font-bold px-5 py-1.5 rounded-full border-2 border-amber-300 uppercase tracking-widest">ลำต้น (ปัญหาหลัก)</span>
                                            <p className="text-3xl font-bold text-slate-800 mt-2">{combinedProblem || "-"}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="relative z-10">
                                        <div className="text-center mb-8"><span className="bg-rose-100 text-rose-800 text-sm font-bold px-5 py-2 rounded-full border border-rose-200 uppercase tracking-widest shadow-sm">ราก (สาเหตุที่ทำให้เกิดปัญหา)</span></div>
                                        <div className="flex items-start justify-center gap-16">
                                            {roots.map(topNode => (
                                                <div key={topNode.id} className="flex flex-col items-center">
                                                    <ArrowUp className="text-rose-400 my-2 h-8 w-8 opacity-60" />
                                                    <RootNodeUI node={topNode} onUpdateItem={handleUpdateRoot} onAddNodeItem={handleAddRootItem} onAddChild={handleAddRootChild} onRemoveItem={handleRemoveRootItem} onSelect={handleSelectRoot} selectedId={selectedRoot.id} />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex justify-center mt-12 relative z-20">
                                            <button onClick={handleAddTopRoot} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl border border-slate-600 font-bold transition-colors shadow-md"><Plus className="h-5 w-5" /> เพิ่มรากสาเหตุหลัก</button>
                                        </div>
                                    </div>
                                </div>

                                {/* --- กล่องเลือก 4M1E จะแสดงเมื่อล็อกเป้ารากแล้วเท่านั้น --- */}
                                {selectedRoot.id && (
                                    <div className="mt-8 bg-blue-50 border border-blue-200 rounded-2xl p-6 shadow-sm min-w-[800px] sticky left-0 animate-in fade-in flex flex-col md:flex-row items-center justify-between gap-6">
                                        <div className="flex-1">
                                            <h3 className="text-sm font-bold text-blue-800 flex items-center gap-2 mb-2"><Target className="h-5 w-5"/> รากแก้วที่ล็อกเป้าไว้ คือ:</h3>
                                            <div className="bg-white p-4 rounded-xl border border-blue-100 shadow-sm">
                                                <p className="text-lg font-bold text-slate-800">{selectedRoot.text}</p>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full bg-white p-5 rounded-xl border border-blue-100 shadow-sm text-center">
                                            <label className="block text-sm font-bold text-slate-700 mb-3">รากแก้วนี้จัดอยู่ในหมวดหมู่ใด? (4M1E) <span className="text-rose-500">*</span></label>
                                            <select 
                                                className="w-full md:w-3/4 p-3 bg-blue-50 border border-blue-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 font-bold text-blue-900"
                                                value={selectedRoot.category || ''}
                                                onChange={(e) => setSelectedRoot({...selectedRoot, category: e.target.value})}
                                            >
                                                <option value="">-- กรุณาเลือกหมวดหมู่ --</option>
                                                <option value="คน (Man)">คน (Man)</option>
                                                <option value="เครื่องมือ (Machine)">เครื่องมือ (Machine)</option>
                                                <option value="วิธีการ (Method)">วิธีการ (Method)</option>
                                                <option value="วัตถุดิบ (Materials)">วัตถุดิบ (Materials)</option>
                                                <option value="สภาพแวดล้อม (Environment)">สภาพแวดล้อม (Environment)</option>
                                            </select>
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}

                        {/* ================= STEP 3: แผนงาน ================= */}
                        {step === 3 && (
                            <section className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-100 max-w-5xl mx-auto animate-in fade-in slide-in-from-bottom-4">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="bg-pink-100 text-pink-700 h-10 w-10 rounded-full flex items-center justify-center font-bold text-xl">3</div>
                                    <h2 className="text-2xl font-bold text-slate-800">แผนแก้ปัญหาแบบ "ขุดราก" (Corrective Action)</h2>
                                </div>
                                
                                <div className="mb-8 bg-pink-50 p-6 rounded-2xl border-2 border-pink-100 flex flex-col md:flex-row items-start md:items-center gap-6 shadow-inner">
                                    <div className="p-4 bg-white rounded-full shadow-md flex-shrink-0"><Target className="w-10 h-10 text-pink-600 animate-pulse" /></div>
                                    <div className="flex-1 w-full">
                                        <h3 className="font-bold text-pink-800 uppercase text-xs tracking-widest mb-1">รากแก้วที่เลือกแก้ไข (HQ REPORT TARGET)</h3>
                                        <p className="text-2xl font-black text-slate-800 italic mb-2">{selectedRoot.text}</p>
                                        <div className="inline-block bg-white px-4 py-1.5 rounded-lg border border-pink-200 shadow-sm">
                                            <span className="text-xs font-bold text-slate-500">หมวดหมู่ 4M1E: </span>
                                            <span className="text-sm font-bold text-pink-700 ml-1">{selectedRoot.category}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="overflow-hidden rounded-2xl border-2 border-slate-200 shadow-sm">
                                    <table className="w-full text-left border-collapse min-w-[800px] text-sm">
                                        <thead className="bg-slate-800 text-white">
                                            <tr>
                                                <th className="p-5 font-bold w-[35%] border-r border-slate-700 uppercase tracking-wider text-sm">ลงมือทำอะไร? (Action)</th>
                                                <th className="p-5 font-bold w-[20%] border-r border-slate-700 uppercase tracking-wider text-sm">ผู้เกี่ยวข้อง (Who)</th>
                                                <th className="p-5 font-bold w-[20%] border-r border-slate-700 uppercase tracking-wider text-sm">กำหนดเสร็จ (When)</th>
                                                <th className="p-5 font-bold w-[25%] uppercase tracking-wider text-sm">วิธีวัดผล (Measurement)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="bg-slate-50">
                                            {actionPlans.map((plan, i) => (
                                                <tr key={i} className="border-b border-slate-200 relative group/row hover:bg-white transition-colors">
                                                    <td className="p-3 border-r border-slate-200 relative">
                                                        {actionPlans.length > 1 && <button onClick={() => removeActionPlan(i)} className="absolute -left-1.5 -top-1.5 bg-rose-500 text-white p-0.5 rounded-full opacity-0 group-hover/row:opacity-100 shadow-sm"><XIcon className="h-3 w-3" /></button>}
                                                        <textarea rows="2" className="w-full p-3 bg-transparent border-none outline-none font-medium" value={plan.action} onChange={e => handleActionPlanChange(i, 'action', e.target.value)} />
                                                    </td>
                                                    <td className="p-3 border-r border-slate-200"><input type="text" className="w-full p-3 bg-transparent border-none outline-none font-medium" value={plan.who} onChange={e => handleActionPlanChange(i, 'who', e.target.value)} /></td>
                                                    <td className="p-3 border-r border-slate-200"><input type="text" className="w-full p-3 bg-transparent border-none outline-none text-rose-600 font-bold" value={plan.when} onChange={e => handleActionPlanChange(i, 'when', e.target.value)} /></td>
                                                    <td className="p-3"><textarea rows="2" className="w-full p-3 bg-transparent border-none outline-none font-medium" value={plan.measure} onChange={e => handleActionPlanChange(i, 'measure', e.target.value)} /></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="mt-6 flex justify-center"><button onClick={addActionPlan} className="flex items-center gap-2 bg-white hover:bg-slate-100 px-6 py-3 rounded-xl border border-slate-300 font-bold text-slate-700 shadow-sm transition-all"><Plus className="h-5 w-5" /> เพิ่มแผนงาน</button></div>
                            </section>
                        )}

                        {/* Navigation Buttons */}
                        <div className="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] print-hidden">
                            <div className="max-w-7xl mx-auto flex justify-between items-center px-4">
                                <button onClick={handlePrev} className={`flex items-center gap-2 px-8 py-4 rounded-xl font-bold transition-all ${step === 1 ? 'opacity-0 pointer-events-none' : 'text-slate-700 bg-slate-100 hover:bg-slate-200'}`}>
                                    <ArrowLeft className="h-5 w-5" /> ย้อนกลับ
                                </button>
                                {step < 3 ? (
                                    <button onClick={handleNext} className="flex items-center gap-3 px-10 py-4 rounded-xl font-bold text-white bg-pink-600 hover:bg-pink-700 shadow-xl transition-all scale-105">
                                        ขั้นตอนต่อไป <ArrowRight className="h-5 w-5" />
                                    </button>
                                ) : (
                                    <button onClick={handleSubmit} disabled={isSubmitting} className={`flex items-center gap-3 px-10 py-4 rounded-xl font-bold text-white shadow-xl transition-all scale-105 ${isSubmitting ? 'bg-slate-500 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                        {isSubmitting ? 'กำลังบันทึกข้อมูล...' : <><Send className="h-5 w-5" /> บันทึกและดูหน้าสรุป (Submit)</>}
                                    </button>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <a href="/admin.html" class="fixed bottom-4 left-4 bg-amber-500 hover:bg-amber-600 text-white p-3.5 rounded-full shadow-xl transition-all hover:scale-110 flex items-center justify-center z-[100] print-hidden" title="เข้าสู่ระบบผู้บริหาร (HQ)">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.518l4.276 3.664a1 1 0 0 0 1.516-.294z"/>
            <path d="M5 21h14"/>
        </svg>
    </a>
</body>
</html>
